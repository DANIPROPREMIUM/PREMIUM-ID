<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PREMIUM ID</title>
<link rel="stylesheet" href="popup.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="premium-container">
    
    <!-- Versión -->
    <div class="version-badge">v4.0</div>
    
    <!-- Header -->
    <div class="premium-header">
        <div class="premium-title">
            <span class="premium-text">PREMIUM</span>
            <span class="id-text">ID</span>
        </div>
        <div class="title-glow"></div>
    </div>
    
    <!-- Instrucción -->
    <div class="instruction-box">
        <i class="fas fa-clipboard-list"></i>
        <span>COPIA UN CÓDIGO ID DESDE PASTE.MYST.RS</span>
    </div>
    
    <!-- Grid de plataformas -->
    <div class="platforms-grid">
        <div class="platform-card netflix" data-platform="netflix" title="Netflix">
            <div class="platform-icon">
                <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/netflix.svg" alt="Netflix">
            </div>
            <span>NETFLIX</span>
        </div>
        
        <div class="platform-card crunchyroll" data-platform="crunchyroll" title="Crunchyroll">
            <div class="platform-icon">
                <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/crunchyroll.svg" alt="Crunchyroll">
            </div>
            <span>CRUNCHYROLL</span>
        </div>
        
        <div class="platform-card prime" data-platform="prime" title="Prime Video">
            <div class="platform-icon prime-logo">
                <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/primevideo.svg" alt="Prime Video">
            </div>
            <span>PRIME VIDEO</span>
        </div>
        
        <div class="platform-card paramount" data-platform="paramount" title="Paramount+">
            <div class="platform-icon">
                <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/paramountplus.svg" alt="Paramount+">
            </div>
            <span>PARAMOUNT+</span>
        </div>
        
        <div class="platform-card viki" data-platform="viki" title="Rakuten Viki">
            <div class="platform-icon">
                <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/rakuten.svg" alt="Viki">
            </div>
            <span>VIKI</span>
        </div>
        
        <div class="platform-card atresplayer" data-platform="atresplayer" title="AtresPlayer">
            <div class="platform-icon atres-text-logo">
                <span class="atres-red">ATRES</span><span class="player-gray">player</span>
            </div>
            <span>ATRESPLAYER</span>
        </div>
    </div>
    
     <!-- Botones de soporte: Telegram + Web -->
    <div class="support-buttons">
        <a href="https://t.me/cuentaspremiumid" target="_blank" class="support-btn telegram">
            <i class="fab fa-telegram"></i>
            <span>TELEGRAM</span>
        </a>
        <a href="https://premium-id.jimdosite.com" target="_blank" class="support-btn web">
            <i class="fas fa-globe"></i>
            <span>WEB PREMIUM ID</span>
        </a>
    </div>
    
    <!-- Status -->
    <div id="status-message" class="status-message"></div>
    
    <!-- Footer -->
    <div class="premium-footer"></div>
</div>
<script src="popup.js"></script>
</body>
</html>
